<!DOCTYPE html>
<html lang="pt-BR">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cadastro de Post</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>


<div class="container">
    <h1>Cadastro de Post</h1>

    <label>Título</label>

    <textarea id="conteudo" placeholder="Digite o conteúdo..."></textarea>

    <button id="btn-post">Enviar POST</button>

    <hr>

    <button id="btn-get">Buscar Posts (GET)</button>

    <ul id="post-list"></ul>

    <p class="nome">Raul de Lara Guizoni</p>

</div>

<script src="script.js"></script>

</html>
